<!doctype html>
<html lang="en" style="background-color: #1a0a00;">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <!-- Tints the iOS Safari status bar / URL bar / toolbar so the safe-area
         zones around the iPhone notch and home indicator paint the SAME
         off-white as the main app background instead of an intrusive dark
         frame. -->
    <meta name="theme-color" content="#FDF3EC" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <!-- `default` (light bar, dark text) matches the new light theme; the
         old `black-translucent` would have forced white status-bar text
         which is unreadable on the light background. -->
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="icon" type="image/png" href="/xiyuehuilogo.png" />
    <title>Xi Yue Hui 禧悦會海鲜自助火锅</title>
    <script>
      if (window.navigator.standalone) {
        document.querySelector('meta[name=viewport]').setAttribute('content', 'width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no');
      }
    </script>
  </head>
  <body style="background-color: #1a0a00;">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
